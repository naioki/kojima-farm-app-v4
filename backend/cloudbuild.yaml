# Cloud Build: バックエンド（FastAPI・PDF生成/OCR）を Docker ビルドして Cloud Run へデプロイする。
# 手順は ../docs/DEPLOY.md 参照。トリガー設定時はこのファイルのディレクトリ（backend/）を
# Cloud Build トリガーの「cloudbuild.yaml の場所」に指定すること。
#
# 秘匿値（SUPABASE_SERVICE_ROLE_KEY・GEMINI_API_KEY）は Secret Manager 経由。
# Discord/LINE WORKS・メール認証情報は初回デプロイ後に Cloud Run コンソールの
# 環境変数から追加してよい（無くても起動・PDF生成・OCR APIは動く。無いのは通知と
# メール自動取り込みのみ）。

substitutions:
  _REGION: asia-northeast1
  _SERVICE: kojima-farm-app-v4-backend
  _DEFAULT_TENANT_ID: ''

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t=gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - -t=gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', 'gcr.io/$PROJECT_ID/${_SERVICE}']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --allow-unauthenticated
      - --set-env-vars=DEFAULT_TENANT_ID=${_DEFAULT_TENANT_ID}
      - --set-secrets=SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-v4:latest,NEXT_PUBLIC_SUPABASE_URL=supabase-url-v4:latest,GEMINI_API_KEY=gemini-api-key-v4:latest

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest
  - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID

options:
  logging: CLOUD_LOGGING_ONLY
